          - generic [ref=e71]: St. Mungo's Hospital for Magical Maladies and Injuries H Arry Was So Relieved That She Was Taking Him Seriously That He Did Not Hesitate, But Jumped Out of Bed at Once, Pulled on His Dressing Gown, and Pushed His Glasses Back Onto His Nose. "Weasley, You Ought to Come Too," Said Professor Mcgonagall. They Followed Professor Mcgonagall Past the Silent Figures of Neville, Dean, and Seamus, Out of the Dormitory, Down the Spiral Stairs Into the Common Room, Through the Portrait Hole, and Off Along the Fat Lady's Moonlit Corridor. Harry Felt As Though the Panic Inside Him Might Spill Over at Any Moment; He Wanted to Run, to Yell for Dumbledore. Mr. Weasley Was Bleeding As They Walked Along So Se- Dately, and What If Those Fangs (Harry Tried Hard Not to Think "My Fangs") Had Been Poisonous? They Passed Mrs. Norris, Who Turned Her Lamplike Eyes Upon Them and Hissed Faintly, But Professor Mcgona- Gall Said, "Shoo!" Mrs. Norris Slunk Away Into the Shadows, and in a Few Minutes They Had Reached the Stone Gargoyle Guarding the En- Trance to Dumbledore's Office. "Fizzing Whizbee," Said Professor Mcgonagall. 466
