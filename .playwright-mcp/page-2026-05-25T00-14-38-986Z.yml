          - generic [ref=e74]: Christmas on the Closed Ward W As This Why Dumbledore Would No Longer Meet Harry's Eyes? Did He Expect to See Voldemort Staring Out of Them, Afraid, Perhaps, That Their Vivid Green Might Turn Suddenly to Scarlet, With Catlike Slits for Pupils? Harry Remembered How the Snakelike Face of Voldemort Had Once Forced Itself Out of the Back of Professor Quir- Rell's Head, and He Ran His Hand Over the Back of His Own, Wondering What It Would Feel Like If Voldemort Burst Out of His Skull. . . . He Felt Dirty, Contaminated, As Though He Were Carrying Some Deadly Germ, Unworthy to Sit on the Underground Train Back From the Hospital With Innocent, Clean People Whose Minds and Bodies Were Free of the Taint of Voldemort. . . . He Had Not Merely Seen the Snake, He Had Been the Snake, He Knew It Now. . . . and Then a Truly Terrible Thought Occurred to Him, a Memory Bob- Bing to the Surface of His Mind, One That Made His Insides Writhe and Squirm Like Serpents. . . . "What's He After Apart From Followers?" "Stuff He Can Only Get by Stealth . . . Like a Weapon. Something He Didn'T Have Last Time." 492
