      - article [ref=e127]:
        - paragraph [ref=e128] [cursor=pointer]: Chapter One. Dudley Demented.
        - paragraph [ref=e129] [cursor=pointer]: The hottest day of the summer so far was drawing to a close and a drowsy silence lay over the large, square houses of Privet Drive. Cars that were usually gleaming stood dusty in their drives and lawns that were once emerald green lay parched and yellowing; the use of hosepipes had been banned due to drought. Deprived of their usual car-washing and lawn-mowing pursuits, the inhabitants of Privet Drive had retreated into the shade of their cool houses, windows thrown wide in the hope of tempting in a nonexistent breeze. The only person left outdoors was a teenage boy who was lying flat on his back in a flower bed outside number four.
        - paragraph [ref=e130] [cursor=pointer]: He was a skinny, black-haired, bespectacled boy who had the pinched, slightly unhealthy look of someone who has grown a lot in a short space of time. His jeans were torn and dirty, his T-shirt baggy and faded, and the soles of his trainers were peeling away from the uppers. Harry Potter's appearance did not endear him to the neighbors, who were the sort of people who thought scruffiness ought to be punishable by law, but as he had hidden himself behind a large hydrangea bush this evening he was quite invisible to passersby. In fact, the only
        - paragraph [ref=e131] [cursor=pointer]: way he would be spotted was if his Uncle Vernon or Aunt Petunia stuck their heads out of the living room window and looked straight down into the flower bed below.
        - paragraph [ref=e132] [cursor=pointer]: On the whole, Harry thought he was to be congratulated on his idea of hiding here. He was not, perhaps, very comfortable lying on the hot, hard earth, but on the other hand, nobody was glaring at him, grinding their teeth so loudly that he could not hear the news, or shooting nasty questions at him, as had happened every time he had tried sitting down in the living room and watching television with his aunt and uncle.
        - paragraph [ref=e133] [cursor=pointer]: Almost as though this thought had fluttered through the open window, Vernon Dursley, Harry's uncle, suddenly spoke. "Glad to see the boy's stopped trying to butt in. Where is he anyway?"
        - paragraph [ref=e134] [cursor=pointer]: "\"I don't know,\" said Aunt Petunia unconcernedly. \"Not in the house.\""
        - paragraph [ref=e135] [cursor=pointer]: Uncle Vernon grunted.
        - paragraph [ref=e136] [cursor=pointer]: "\"Watching the news . . .\" he said scathingly. \"I'd like to know what he's really up to. As if a normal boy cares what's on the news - Dudley hasn't got a clue what's going on, doubt he knows who the Prime Minister is! Anyway, it's not as if there'd be anything about his lot on our news - \""
        - paragraph [ref=e137] [cursor=pointer]: "\"Vernon, shh!\" said Aunt Petunia. \"The window's open!\""
        - paragraph [ref=e138] [cursor=pointer]: "\"Oh - yes - sorry, dear . . .\""
        - paragraph [ref=e139] [cursor=pointer]: The Dursleys fell silent. Harry listened to a jingle about Fruit 'N Bran breakfast cereal while he watched Mrs. Figg, a batty, cat-loving old lady from nearby Wisteria Walk, amble slowly past. She was frowning and muttering to herself. Harry was very pleased that he was concealed behind the bush; Mrs. Figg had recently taken to asking him around for tea whenever she met him in the street. She had rounded the corner and vanished from view before Uncle Vernon's voice floated out of the window again.
        - paragraph [ref=e140] [cursor=pointer]: "\"Dudders out for tea?\""
        - paragraph [ref=e141] [cursor=pointer]: "\"At the Polkisses',\" said Aunt Petunia fondly. \"He's got so many little friends, he's so popular . . .\""
        - paragraph [ref=e142] [cursor=pointer]: Harry repressed a snort with difficulty. The Dursleys really were astonishingly stupid about their son, Dudley; they had swallowed all his dim-witted lies about having tea with a different member of his gang every night of the summer holidays. Harry knew perfectly well that Dudley had not been to tea anywhere; he and his gang spent every evening vandalizing the play park, smoking on street corners, and throwing stones at passing cars and children. Harry had seen them at it during his evening walks around Little Whinging; he had spent most of the holidays wandering the streets, scavenging newspapers from bins along the way.
        - paragraph [ref=e143] [cursor=pointer]: The opening notes of the music that heralded the seven o'clock news reached Harry's ears and his stomach turned over. Perhaps tonight - after a month of waiting - would be the night -
