          - generic [ref=e44]: Detention With Dolores D Inner in the Great Hall That Night Was Not a Pleasant Experi- Ence for Harry. the News About His Shouting Match With Umbridge Seemed to Have Traveled Exceptionally Fast Even by Hog- Warts Standards. He Heard Whispers All Around Him As He Sat Eating Between Ron and Hermione. the Funny Thing Was That None of the Whisperers Seemed to Mind Him Overhearing What They Were Saying About Him - on the Contrary, It Was As Though They Were Hoping He Would Get Angry and Start Shouting Again, So That They Could Hear His Story Firsthand. "He Says He Saw Cedric Diggory Murdered. . . ." "He Reckons He Dueled With You-Know-Who. . . ." "Come Off It. . . ." "Who Does He Think He's Kidding?" "Pur-Lease . . ." "What I Don'T Get," Said Harry in a Shaking Voice, Laying Down His Knife and Fork (His Hands Were Trembling Too Much to Hold Them Steady), "Is Why They All Believed the Story Two Months Ago When Dumbledore Told Them. . . ." 250
