          - generic [ref=e62]: The Lion and the Serpent H Arry Felt As Though He Were Carrying Some Kind of Talisman Inside His Chest Over the Following Two Weeks, a Glowing Se- Cret That Supported Him Through Umbridge's Classes and Even Made It Possible for Him to Smile Blandly As He Looked Into Her Horrible Bulging Eyes. He and the D.A. Were Resisting Her Under Her Very Nose, Doing the Very Thing That She and the Ministry Most Feared, and When- Ever He Was Supposed to Be Reading Wilbert Slinkhard's Book During Her Lessons He Dwelled Instead on Satisfying Memories of Their Most Re- Cent Meetings, Remembering How Neville Had Successfully Disarmed Hermione, How Colin Creevey Had Mastered the Impediment Jinx Af- Ter Three Meetings' Hard Effort, How Parvati Patil Had Produced Such a Good Reductor Curse That She Had Reduced the Table Carrying All the Sneakoscopes to Dust. He Was Finding It Almost Impossible to Fix a Regular Night of the Week for D.A. Meetings, As They Had to Accommodate Three Separate Quidditch Teams' Practices, Which Were Often Rearranged Depending on the Weather Conditions; But Harry Was Not Sorry About This, He Had a Feeling That It Was Probably Better to Keep the Timing of Their Meetings 397
