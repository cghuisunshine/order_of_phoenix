          - generic [ref=e20]: The Order of the Phoenix Y Our - ?" "My Dear Old Mum, Yeah," Said Sirius. "We'Ve Been Trying to Get Her Down for a Month But We Think She Put a Permanent Stick- Ing Charm on the Back of the Canvas. Let's Get Downstairs, Quick, Before They All Wake Up Again." "But What's a Portrait of Your Mother Doing Here?" Harry Asked, Bewildered, As They Went Through the Door From the Hall and Led the Way Down a Flight of Narrow Stone Steps, the Others Just Behind Them. "Hasn'T Anyone Told You? This Was My Parents' House," Said Sirius. "But I'M the Last Black Left, So It's Mine Now. I Offered It to Dumbledore for Headquarters - About the Only Useful Thing I'Ve Been Able to Do." Harry, Who Had Expected a Better Welcome, Noted How Hard and Bitter Sirius's Voice Sounded. He Followed His Godfather to the Bottom of the Stairs and Through a Door Leading Into the Basement Kitchen. It Was Scarcely Less Gloomy Than the Hall Above, a Cavernous Room With Rough Stone Walls. Most of the Light Was Coming From a Large Fire at the Far End of the Room. a Haze of Pipe Smoke Hung in the Air Like Battle Fumes, Through Which Loomed the Menacing Shapes of Heavy 79
