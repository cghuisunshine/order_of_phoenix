          - generic [ref=e26]: The Ministry of Magic H Arry Awoke at Half-Past Five the Next Morning As Abruptly and Completely As If Somebody Had Yelled in His Ear. for a Few Moments He Lay Immobile As the Prospect of the Hearing Filled Every Tiny Particle of His Brain, Then, Unable to Bear It, He Leapt Out of Bed and Put on His Glasses. Mrs. Weasley Had Laid Out His Freshly Laundered Jeans and T-Shirt at the Foot of His Bed. Harry Scrambled Into Them. the Blank Picture on the Wall Sniggered Again. Ron Was Lying Sprawled on His Back With His Mouth Wide Open, Fast Asleep. He Did Not Stir As Harry Crossed the Room, Stepped Out Onto the Landing, and Closed the Door Softly Behind Him. Trying Not to Think of the Next Time He Would See Ron, When They Might No Longer Be Fellow Students at Hogwarts, Harry Walked Quietly Down the Stairs, Past the Heads of Kreacher's Ancestors, and Into the Kitchen. He Had Expected It to Be Empty, But It Was Not. When He Reached the Door He Heard the Soft Rumble of Voices on the Other Side and When He Pushed It Open He Saw Mr. and Mrs. Weasley, Sirius, Lupin, and Tonks Sitting There Almost As Though They Were Waiting for Him.
