          - generic [ref=e56]: "Educational Decree Number Twenty-Four H Arry Felt Happier for the Rest of the Weekend Than He Had Done All Term. He and Ron Spent Much of Sunday Catching Up With All Their Homework Again, and Although This Could Hardly Be Called Fun, the Last Burst of Autumn Sunshine Persisted, So Rather Than Sitting Hunched Over Tables in the Common Room, They Took Their Work Outside and Lounged in the Shade of a Large Beech Tree on the Edge of the Lake. Hermione, Who of Course Was Up to Date With All Her Work, Brought More Wool Outside With Her and Bewitched Her Knitting Nee- Dles So That They Flashed and Clicked in Midair Beside Her, Producing More Hats and Scarves. the Knowledge That They Were Doing Something to Resist Umbridge and the Ministry, and That He Was a Key Part of the Rebellion, Gave Harry a Feeling of Immense Satisfaction. He Kept Reliving Saturday's Meeting in His Mind: All Those People, Coming to Him to Learn Defense Against the Dark Arts . . . and the Looks on Their Faces As They Had Heard Some of the Things He Had Done . . . and Cho Praising His Per- Formance in the Triwizard Tournament. . . . the Knowledge That All"
