          - generic [ref=e17]: Number Twelve, Grimmauld Place W Hat's the Order of the - ?" Harry Began. "Not Here, Boy!" Snarled Moody. "Wait Till We'Re Inside!" He Pulled the Piece of Parchment Out of Harry's Hand and Set Fire to It With His Wand Tip. As the Message Curled Into Flames and Floated to the Ground, Harry Looked Around at the Houses Again. They Were Standing Outside Number Eleven; He Looked to the Left and Saw Num- Ber Ten; to the Right, However, Was Number Thirteen. "But Where's - ?" "Think About What You'Ve Just Memorized," Said Lupin Quietly. Harry Thought, and No Sooner Had He Reached the Part About Num- Ber Twelve, Grimmauld Place, Than a Battered Door Emerged Out of Nowhere Between Numbers Eleven and Thirteen, Followed Swiftly by Dirty Walls and Grimy Windows. It Was As Though an Extra House Had Inflated, Pushing Those on Either Side Out of Its Way. Harry Gaped at It. the Stereo in Number Eleven Thudded On. Apparently the Muggles In- Side Hadn'T Even Felt Anything. "Come On, Hurry," Growled Moody, Prodding Harry in the Back.
