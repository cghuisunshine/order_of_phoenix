          - generic [ref=e107]: The Department of Mysteries H Arry Wound His Hand Tightly Into the Mane of the Nearest Thestral, Placed a Foot on a Stump Nearby, and Scrambled Clumsily Onto the Horse's Silken Back. It Did Not Object, But Twisted Its Head Around, Fangs Bared, and Attempted to Continue Its Eager Licking of His Robes. He Found There Was a Way of Lodging His Knees Behind the Wing Joints That Made Him Feel More Secure and Looked Around at the Oth- Ers. Neville Had Heaved Himself Over the Back of the Next Thestral and Was Now Attempting to Swing One Short Leg Over the Creature's Back. Luna Was Already in Place, Sitting Sidesaddle and Adjusting Her Robes As Though She Did This Every Day. Ron, Hermione, and Ginny, However, Were Still Standing Motionless on the Spot, Openmouthed and Staring. "What?" He Said. "How'Re We Supposed to Get On?" Said Ron Faintly. "When We Can'T See the Things?" "Oh It's Easy," Said Luna, Sliding Obligingly From Her Thestral and Marching Over to Him, Hermione, and Ginny. "Come Here. . . ."
